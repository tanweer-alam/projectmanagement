version: '3.8'

services:
 keycloak:
  image: quay.io/keycloak/keycloak:24.0
  container_name: keycloak
  environment:
   - KEYCLOAK_ADMIN=admin
   - KEYCLOAK_ADMIN_PASSWORD=admin
   - KC_HTTP_PORT = 
  ports:
   - "8080:8080"
  command: ["start-dev"]
  volumes:
   - keycloak_data:/opt/keycloak/data

volumes:
 keycloak_data: 
